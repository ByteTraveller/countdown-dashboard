        }

        applyAppearance(localStorage.getItem(APPEARANCE_KEY) || "dark");
        applyTheme(localStorage.getItem(THEME_KEY) || "aurora");

        function pad(n) {
            return String(n).padStart(2, "0");
        }

        function formatDateTime(ts) {
            const d = new Date(ts);
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function formatDateTimeLocalValue(ts) {
            const d = new Date(ts);
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function setEditDateTimeValue(ts, defer = false) {
            const nextValue = formatDateTimeLocalValue(ts);
            const applyValue = () => {
                editEventEndTimeEl.value = "";
                editEventEndTimeEl.value = nextValue;
            };

            if (defer) {
                requestAnimationFrame(applyValue);
                return;
            }

            applyValue();
        }

        function getNextValidMinute() {
            const next = new Date(Date.now() + 60 * 1000);
            next.setSeconds(0, 0);
            return next;
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function sanitizeTimeTextInput(event) {
            const digits = Number(event.target.dataset.digits || event.target.maxLength || 2);
            event.target.value = event.target.value.replace(/\D/g, "").slice(0, digits);
        }

        function getInputNumberValue(inputEl, fallback) {
            const value = Number(inputEl.value);
            return Number.isFinite(value) ? value : fallback;
        }

        function formatSpinnerValue(inputEl, value) {
            if (inputEl.dataset.durationPart === "days") {
                return String(value);
            }

            const digits = Number(inputEl.dataset.digits || 2);
            return String(value).padStart(digits, "0");
        }

        function setInputDisplayValue(inputEl, value) {
            inputEl.value = formatSpinnerValue(inputEl, value);
        }

        function updateSpinnerPreview(inputEl, prevEl, nextEl) {
            const value = getInputNumberValue(inputEl, NaN);
            const min = Number(inputEl.dataset.min || 0);
            const max = Number(inputEl.dataset.max || 59);
            const prevValue = Number.isFinite(value) && value > min ? formatSpinnerValue(inputEl, value - 1) : formatSpinnerValue(inputEl, min);
            const nextValue = Number.isFinite(value) && value < max ? formatSpinnerValue(inputEl, value + 1) : formatSpinnerValue(inputEl, max);

            prevEl.textContent = prevValue;
            nextEl.textContent = nextValue;
            prevEl.classList.toggle("is-empty", !(Number.isFinite(value) && value > min));
            nextEl.classList.toggle("is-empty", !(Number.isFinite(value) && value < max));
        }

        function syncDurationPicker() {
            const configs = [
                { input: daysEl, prev: daysPrevEl, next: daysNextEl, min: 0, max: 999 },
                { input: hoursEl, prev: hoursPrevEl, next: hoursNextEl, min: 0, max: 23 },
                { input: minutesEl, prev: minutesPrevEl, next: minutesNextEl, min: 0, max: 59 },
                { input: secondsEl, prev: secondsPrevEl, next: secondsNextEl, min: 0, max: 59 }
            ];

            configs.forEach(({ input, prev, next, min, max }) => {
                input.dataset.min = String(min);
                input.dataset.max = String(max);
                const value = clamp(getInputNumberValue(input, min), min, max);
                setInputDisplayValue(input, value);
                updateSpinnerPreview(input, prev, next);
            });
        }

        function getDateTimeBounds(selectedDateStr) {
            const minDate = getNextValidMinute();
            return {
                minDate,
                minYear: minDate.getFullYear(),
                minMonth: minDate.getMonth() + 1,
                minDay: minDate.getDate(),
                minHour: minDate.getHours(),
                minMinute: minDate.getMinutes()
            };
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function getSelectedDateParts() {
            return {
                year: getInputNumberValue(targetYearEl, NaN),
                month: getInputNumberValue(targetMonthEl, NaN),
                day: getInputNumberValue(targetDayEl, NaN)
            };
        }

        function syncDateTimePicker(source = "date") {
            const bounds = getDateTimeBounds();
            const maxYear = bounds.minYear + 20;
            const current = getSelectedDateParts();

            targetYearEl.dataset.min = String(bounds.minYear);
            targetYearEl.dataset.max = String(maxYear);
            let yearValue = clamp(current.year || bounds.minYear, bounds.minYear, maxYear);
            setInputDisplayValue(targetYearEl, yearValue);

            const minMonth = yearValue === bounds.minYear ? bounds.minMonth : 1;
            targetMonthEl.dataset.min = String(minMonth);
            targetMonthEl.dataset.max = "12";
            let monthValue = clamp(current.month || minMonth, minMonth, 12);
            setInputDisplayValue(targetMonthEl, monthValue);

            const minDay = yearValue === bounds.minYear && monthValue === bounds.minMonth ? bounds.minDay : 1;
            const maxDay = getDaysInMonth(yearValue, monthValue);
            targetDayEl.dataset.min = String(minDay);
            targetDayEl.dataset.max = String(maxDay);
            let dayValue = clamp(current.day || minDay, minDay, maxDay);
            setInputDisplayValue(targetDayEl, dayValue);

            const isMinDate = yearValue === bounds.minYear && monthValue === bounds.minMonth && dayValue === bounds.minDay;
            const hourCurrent = getInputNumberValue(targetHourEl, isMinDate ? bounds.minHour : 0);
            const minuteCurrent = getInputNumberValue(targetMinuteEl, isMinDate ? bounds.minMinute : 0);

            targetHourEl.dataset.min = String(isMinDate ? bounds.minHour : 0);
            targetHourEl.dataset.max = "23";
            let hourValue = clamp(hourCurrent, Number(targetHourEl.dataset.min), 23);
            setInputDisplayValue(targetHourEl, hourValue);

            const minuteMin = isMinDate && hourValue === bounds.minHour ? bounds.minMinute : 0;
            targetMinuteEl.dataset.min = String(minuteMin);
            targetMinuteEl.dataset.max = "59";
            let minuteValue = clamp(minuteCurrent, minuteMin, 59);
            if ((source === "year" || source === "month" || source === "day" || source === "hour") && isMinDate && hourValue === bounds.minHour && minuteCurrent < minuteMin) {
                minuteValue = minuteMin;
            }
            setInputDisplayValue(targetMinuteEl, minuteValue);

            updateSpinnerPreview(targetYearEl, targetYearPrevEl, targetYearNextEl);
            updateSpinnerPreview(targetMonthEl, targetMonthPrevEl, targetMonthNextEl);
            updateSpinnerPreview(targetDayEl, targetDayPrevEl, targetDayNextEl);
            updateSpinnerPreview(targetHourEl, targetHourPrevEl, targetHourNextEl);
            updateSpinnerPreview(targetMinuteEl, targetMinutePrevEl, targetMinuteNextEl);
        }

        function getSelectedDateTime() {
            if (!targetYearEl.value || !targetMonthEl.value || !targetDayEl.value || !targetHourEl.value || !targetMinuteEl.value) {
                return NaN;
            }

            return new Date(
                Number(targetYearEl.value),
                Number(targetMonthEl.value) - 1,
                Number(targetDayEl.value),
                Number(targetHourEl.value),
                Number(targetMinuteEl.value),
                0,
                0
            ).getTime();
        }

        function adjustTimeInput(inputEl, delta) {
            const currentValue = getInputNumberValue(inputEl, 0);
            const min = Number(inputEl.dataset.min || 0);
            const max = Number(inputEl.dataset.max || 59);
            setInputDisplayValue(inputEl, clamp(currentValue + delta, min, max));

            if (inputEl.dataset.durationPart) {
                syncDurationPicker();
                return;
            }

            syncDateTimePicker(inputEl.dataset.part || "minute");
        }

        function bindDragNumberInput(inputEl) {
            const wrapper = inputEl.closest(".time-spinner");
            let startY = 0;
            let lastStep = 0;
            let dragging = false;

            const beginDrag = clientY => {
                dragging = true;
                startY = clientY;
                lastStep = 0;
                wrapper.classList.add("dragging");
            };

            const moveDrag = clientY => {
                if (!dragging) return;

                const delta = clientY - startY;
                const nextStep = Math.trunc(delta / 18);
                const change = nextStep - lastStep;

                if (change !== 0) {
                    adjustTimeInput(inputEl, -change);
                    lastStep = nextStep;
                }
            };

            const endDrag = () => {
                if (!dragging) return;
                dragging = false;
                wrapper.classList.remove("dragging");
            };

            wrapper.addEventListener("wheel", event => {
                event.preventDefault();
                adjustTimeInput(inputEl, event.deltaY < 0 ? -1 : 1);
            }, { passive: false });

            if (window.PointerEvent) {
                wrapper.addEventListener("pointerdown", event => {
                    event.preventDefault();
                    beginDrag(event.clientY);
                    wrapper.setPointerCapture(event.pointerId);
                });

                wrapper.addEventListener("pointermove", event => {
                    if (!dragging) return;
                    event.preventDefault();
                    moveDrag(event.clientY);
                });

                const stopDragging = event => {
                    if (!dragging) return;
                    endDrag();
                    if (typeof event.pointerId === "number" && wrapper.hasPointerCapture(event.pointerId)) {
                        wrapper.releasePointerCapture(event.pointerId);
                    }
                };

                wrapper.addEventListener("pointerup", stopDragging);
                wrapper.addEventListener("pointercancel", stopDragging);
                wrapper.addEventListener("lostpointercapture", endDrag);
                return;
            }

            wrapper.addEventListener("touchstart", event => {
                const touch = event.touches[0];
                if (!touch) return;
                event.preventDefault();
                beginDrag(touch.clientY);
            }, { passive: false });

            wrapper.addEventListener("touchmove", event => {
                if (!dragging) return;
                const touch = event.touches[0];
                if (!touch) return;
                event.preventDefault();
                moveDrag(touch.clientY);
            }, { passive: false });

            wrapper.addEventListener("touchend", () => {
                endDrag();
            });

            wrapper.addEventListener("touchcancel", () => {
                endDrag();
            });

            wrapper.addEventListener("mouseleave", () => {
                if (dragging) {
                    endDrag();
                }
            });
        }

        function formatRemain(ms) {
            if (ms <= 0) return "00天 00:00:00";
            const totalSec = Math.floor(ms / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const minutes = Math.floor((totalSec % 3600) / 60);
            const seconds = totalSec % 60;
            return `${pad(days)}天 ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        }

        function setDefaultDateTime() {
            const defaultDate = new Date(Date.now() + 10 * 60 * 1000);
            defaultDate.setSeconds(0, 0);
            setInputDisplayValue(targetYearEl, defaultDate.getFullYear());
            setInputDisplayValue(targetMonthEl, defaultDate.getMonth() + 1);
            setInputDisplayValue(targetDayEl, defaultDate.getDate());
            setInputDisplayValue(targetHourEl, defaultDate.getHours());
            setInputDisplayValue(targetMinuteEl, defaultDate.getMinutes());
            syncDateTimePicker();
        }

        function splitDuration(ms) {
            const safeMs = Math.max(ms, 0);
            const totalSec = Math.floor(safeMs / 1000);
            return {
                days: Math.floor(totalSec / 86400),
                hours: Math.floor((totalSec % 86400) / 3600),
                minutes: Math.floor((totalSec % 3600) / 60),
                seconds: totalSec % 60
            };
        }

        function getEditDurationMs() {
            const days = Math.max(Number(editDaysEl.value || 0), 0);
            const hours = Math.min(Math.max(Number(editHoursEl.value || 0), 0), 23);
            const minutes = Math.min(Math.max(Number(editMinutesEl.value || 0), 0), 59);
            const seconds = Math.min(Math.max(Number(editSecondsEl.value || 0), 0), 59);
            return (((days * 24 + hours) * 60 + minutes) * 60 + seconds) * 1000;
        }

        function setEditDurationValues(ms) {
            const { days, hours, minutes, seconds } = splitDuration(ms);
            editDaysEl.value = days;
            editHoursEl.value = hours;
            editMinutesEl.value = minutes;
            editSecondsEl.value = seconds;
        }

        function getEditDurationValues() {
            return {
                days: Math.max(Number(editDaysEl.value || 0), 0),
                hours: Math.min(Math.max(Number(editHoursEl.value || 0), 0), 23),
                minutes: Math.min(Math.max(Number(editMinutesEl.value || 0), 0), 59),
                seconds: Math.min(Math.max(Number(editSecondsEl.value || 0), 0), 59)
            };
        }

        function isSameDurationValues(a, b) {
            return a.days === b.days && a.hours === b.hours && a.minutes === b.minutes && a.seconds === b.seconds;
        }

        function syncEditDateTimeInput(options = {}) {
            const { forceClamp = false, preservePastValue = false } = options;
            const minTs = getNextValidMinute().getTime();
            const minValue = formatDateTimeLocalValue(minTs);
            editEventEndTimeEl.min = minValue;

            if (currentEditMode !== "datetime") {
                return;
            }

            const currentTs = new Date(editEventEndTimeEl.value).getTime();
            if (!editEventEndTimeEl.value || Number.isNaN(currentTs)) {
                setEditDateTimeValue(minTs);
                return;
            }

            if (currentTs < minTs) {
                if (preservePastValue && !forceClamp) {
                    return;
                }

                const safeTs = Math.max(currentTs || 0, minTs);
                setEditDateTimeValue(safeTs);
                return;
            }

            if (forceClamp) {
                setEditDateTimeValue(currentTs);
            }
        }

        function updateEditModeButtons() {
            editModeButtons.forEach(button => button.classList.toggle("active", button.dataset.editMode === currentEditMode));
            editDateTimeFieldEl.classList.toggle("hidden", currentEditMode !== "datetime");
            editDurationFieldEl.classList.toggle("hidden", currentEditMode !== "duration");
            editTimeLabelEl.textContent = currentEditMode === "datetime" ? "结束时间" : "剩余时长";
        }

        function switchEditMode(mode) {
            const nextMode = mode === "duration" ? "duration" : "datetime";
            if (currentEditMode !== nextMode) {
                if (nextMode === "duration") {
                    const endAt = new Date(editEventEndTimeEl.value).getTime();
                    setEditDurationValues(Number.isNaN(endAt) ? 0 : Math.max(endAt - Date.now(), 0));
                } else {
                    if (originalEditEndAt <= Date.now() && !editDurationDirty) {
                        setEditDateTimeValue(originalEditEndAt);
                        syncEditDateTimeInput({ preservePastValue: true });
                    } else {
                        const durationMs = getEditDurationMs();
                        setEditDateTimeValue(Date.now() + Math.max(durationMs, 60 * 1000));
                        syncEditDateTimeInput({ forceClamp: true });
                    }
                }
            }
            currentEditMode = nextMode;
            updateEditModeButtons();
        }

        function closeEditModal() {
            editingEventId = null;
            editModalEl.classList.add("hidden");
        }

        function openEditModal(id) {
            const item = events.find(event => event.id === id);
            if (!item) return;

            editingEventId = id;
            originalEditMode = item.mode === "duration" ? "duration" : "datetime";
            originalEditEndAt = item.endAt;
            editDateTimeDirty = false;
            editDurationDirty = false;
            editEventNameEl.value = item.name || "";
            editEventRemarkEl.value = item.remark || "";
            const initialEditTs = item.endAt;
            setEditDateTimeValue(initialEditTs);
            originalEditDateTimeValue = formatDateTimeLocalValue(initialEditTs);
            currentEditMode = originalEditMode;
            setEditDurationValues(Math.max(item.endAt - Date.now(), 0));
            originalEditDurationValues = getEditDurationValues();
            syncEditDateTimeInput({ preservePastValue: true });
            updateEditModeButtons();
            editModalEl.classList.remove("hidden");
            setEditDateTimeValue(initialEditTs, true);
            syncEditDateTimeInput({ preservePastValue: true });
            editEventNameEl.focus();
        }

        function saveEditedEvent() {
            const item = events.find(event => event.id === editingEventId);
            if (!item) {
                closeEditModal();
                return;
            }

            const name = editEventNameEl.value.trim();
            const remark = editEventRemarkEl.value.trim();
            let endAt = 0;

            if (!name) {
                alert("请填写事件名称");
                editEventNameEl.focus();
                return;
            }

            const modeChanged = currentEditMode !== originalEditMode;
            const dateTimeChanged = editDateTimeDirty || editEventEndTimeEl.value !== originalEditDateTimeValue;
            const durationChanged = editDurationDirty || !isSameDurationValues(getEditDurationValues(), originalEditDurationValues);
            const originalEventDone = originalEditEndAt <= Date.now();
            const noTimeAdjustment = !dateTimeChanged && !durationChanged;

            if (originalEventDone && noTimeAdjustment) {
                endAt = originalEditEndAt;
                item.name = name;
                item.remark = remark;
                item.mode = currentEditMode;
                item.endAt = endAt;
                saveEvents();
                closeEditModal();
                eventListEl.innerHTML = "";
                render();
                return;
            }

            if (currentEditMode === "datetime") {
                if (!modeChanged && !dateTimeChanged) {
                    endAt = originalEditEndAt;
                } else {
                    syncEditDateTimeInput({ forceClamp: true });
                    endAt = new Date(editEventEndTimeEl.value).getTime();
                    if (originalEventDone && (Number.isNaN(endAt) || endAt <= Date.now())) {
                        endAt = originalEditEndAt;
                    }
                    if (Number.isNaN(endAt) || endAt <= Date.now()) {
                        alert("结束时间必须晚于当前时间");
                        editEventEndTimeEl.focus();
                        return;
                    }
                }
            } else {
                if (!modeChanged && !durationChanged) {
                    endAt = originalEditEndAt;
                } else {
                    const durationMs = getEditDurationMs();
                    if (originalEventDone && durationMs <= 0) {
                        endAt = originalEditEndAt;
                    } else {
                        if (durationMs <= 0) {
                            alert("请输入大于 0 的剩余时长");
                            editDaysEl.focus();
                            return;
                        }
                        endAt = Date.now() + durationMs;
                    }
                }
            }

            item.name = name;
            item.remark = remark;
            item.mode = currentEditMode;
            item.endAt = endAt;
            saveEvents();
            closeEditModal();
            eventListEl.innerHTML = "";
            render();
        }

        function createEvent() {
            const name = eventNameEl.value.trim();
            const remark = eventRemarkEl.value.trim();
            const createdAt = Date.now();
            let endAt = 0;

            if (!name) {
                alert("请填写事件名称");
                eventNameEl.focus();
                return;
            }

            if (currentMode === "datetime") {
                syncDateTimePicker();
                endAt = getSelectedDateTime();
                if (isNaN(endAt) || endAt <= createdAt) {
                    alert("目标时间必须晚于当前时间");
                    syncDateTimePicker();
                    return;
                }
            } else {
                const d = Number(daysEl.value || 0);
                const h = Number(hoursEl.value || 0);
                const m = Number(minutesEl.value || 0);
                const s = Number(secondsEl.value || 0);
                const durationMs = (((d * 24 + h) * 60 + m) * 60 + s) * 1000;
                if (durationMs <= 0) {
                    alert("请输入大于 0 的倒计时时长");
                    return;
                }
                endAt = createdAt + durationMs;
            }

            events.unshift({
                id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
                name,
                remark,
                mode: currentMode,
                createdAt,
                endAt
            });

            saveEvents();
            render();
            eventNameEl.value = "";
            eventRemarkEl.value = "";
            daysEl.value = 0;
            hoursEl.value = 0;
            minutesEl.value = 10;
            secondsEl.value = 0;
            setDefaultDateTime();
        }

        function clearFinished() {
            events = events.filter(item => item.endAt > Date.now());
            saveEvents();
            render();
        }

        function deleteEvent(id) {
            events = events.filter(item => item.id !== id);
            saveEvents();
            render();
        }

        function renderStats() {
            const now = Date.now();
            const total = events.length;
            const running = events.filter(e => e.endAt > now).length;
            const finished = total - running;

            statTotalEl.textContent = total;
            statRunningEl.textContent = running;
            statFinishedEl.textContent = finished;
        }

        function getSortedEvents() {
            return [...events].sort((a, b) => {
                const diff = (a[currentSortField] || 0) - (b[currentSortField] || 0);
                return currentSortOrder === "desc" ? -diff : diff;
            });
        }

        function getEventCardMarkup(item, now) {
            const remain = item.endAt - now;
            const done = remain <= 0;
            const total = Math.max(item.endAt - item.createdAt, 1);
            const passed = Math.min(Math.max(now - item.createdAt, 0), total);
            const progress = Math.min((passed / total) * 100, 100);

            return `
                <article class="panel card ${done ? "is-done" : ""}" data-event-id="${item.id}">
                    <div class="card-header">
                        <div class="title">${escapeHtml(item.name)}</div>
                        <div class="badge ${done ? "done" : "running"}">${done ? "已结束" : "进行中"}</div>
                    </div>

                    <div class="remain">${done ? "时间到" : formatRemain(remain)}</div>

                    ${item.remark ? `<div class="remark">备注：${escapeHtml(item.remark)}</div>` : ""}

                    <div class="meta">
                        <div>结束时间：${formatDateTime(item.endAt)}</div>
                        <div>创建时间：${formatDateTime(item.createdAt)}</div>
                        <div>创建方式：${item.mode === "datetime" ? "按具体时间" : "按时长倒计时"}</div>
                    </div>

                    <div class="progress">
                        <div class="bar" style="width:${progress}%"></div>
                    </div>

                    <div class="card-actions">
                        <button class="btn mini edit" onclick="openEditModal('${item.id}')">编辑</button>
                        <button class="btn mini danger" onclick="deleteEvent('${item.id}')">删除</button>
                    </div>
                </article>
            `;
        }

        function updateEventCard(cardEl, item, now) {
            const remain = item.endAt - now;
            const done = remain <= 0;
            const total = Math.max(item.endAt - item.createdAt, 1);
            const passed = Math.min(Math.max(now - item.createdAt, 0), total);
            const progress = Math.min((passed / total) * 100, 100);

            const badgeEl = cardEl.querySelector(".badge");
            const remainEl = cardEl.querySelector(".remain");
            const barEl = cardEl.querySelector(".bar");

            if (badgeEl) {
                badgeEl.textContent = done ? "已结束" : "进行中";
                badgeEl.classList.toggle("done", done);
                badgeEl.classList.toggle("running", !done);
            }

            cardEl.classList.toggle("is-done", done);

            if (remainEl) {
                remainEl.textContent = done ? "时间到" : formatRemain(remain);
            }

            if (barEl) {
                barEl.style.width = `${progress}%`;
            }
        }

        function render() {
            renderStats();

            if (!events.length) {
                eventListEl.innerHTML = `<div class="empty">暂无倒计时事件，先创建一个吧。</div>`;
                return;
            }

            const now = Date.now();
            const sortedEvents = getSortedEvents();
            const currentIds = Array.from(eventListEl.querySelectorAll(".card[data-event-id]")).map(card => card.dataset.eventId);
            const nextIds = sortedEvents.map(item => item.id);
            const needsFullRender = currentIds.length !== nextIds.length || currentIds.some((id, index) => id !== nextIds[index]);

            if (needsFullRender) {
                eventListEl.innerHTML = sortedEvents.map(item => getEventCardMarkup(item, now)).join("");
                return;
            }

            sortedEvents.forEach(item => {
                const cardEl = eventListEl.querySelector(`.card[data-event-id="${item.id}"]`);
                if (cardEl) {
                    updateEventCard(cardEl, item, now);
                }
            });
        }

        function escapeHtml(str) {
            return String(str ?? "").replace(/[&<>"']/g, s => ({
                "&":"&amp;",
                "<":"&lt;",
                ">":"&gt;",
                "\"":"&quot;",
                "'":"&#39;"
            }[s]));
        }

        function formatWeekday(date) {
            return new Intl.DateTimeFormat("zh-CN", {
                weekday: "long"
            }).format(date);
        }

        function formatLunarDay(dayNumber) {
            const day = Number(dayNumber);
            if (!Number.isFinite(day) || day <= 0) return "";

            const dayMap = [
                "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
                "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
                "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"
            ];

            return dayMap[day - 1] || "";
        }

        function formatLunarMonth(monthText) {
            const raw = String(monthText || "").replace(/闰/g, "闰").trim();
            if (/月/.test(raw) && /[正冬腊一二三四五六七八九十]/.test(raw)) {
                return raw;
            }

            const isLeap = raw.startsWith("闰");
            const numericText = raw.replace(/[^\d]/g, "");
            const monthNumber = Number(numericText);
            const monthMap = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "冬月", "腊月"];
            const monthName = monthMap[monthNumber - 1] || raw;
            return isLeap ? `闰${monthName}` : monthName;
        }

        function formatLunarDate(date) {
            try {
                const formatter = new Intl.DateTimeFormat("zh-CN-u-ca-chinese", {
                    month: "long",
                    day: "numeric"
                });
                const parts = formatter.formatToParts(date);
                const monthText = parts.find(part => part.type === "month")?.value || "";
                const dayText = parts.find(part => part.type === "day")?.value || "";
                const lunarMonth = formatLunarMonth(monthText);
                const lunarDay = formatLunarDay(dayText);
                return `农历${lunarMonth}${lunarDay}`;
            } catch {
                return "农历暂不可用";
            }
        }

        function joinLocationParts(parts) {
            return parts
                .map(part => String(part || "").trim())
                .filter(part => part && !["-", "--", "null", "undefined"].includes(part.toLowerCase()))
                .filter((part, index, array) => array.indexOf(part) === index)
                .join(" · ");
        }

        function parseLocationResult(source, data, fallbackTimeZone) {
            if (!data || typeof data !== "object") {
                return null;
            }

            let country = "";
            let region = "";
            let city = "";
            let zone = fallbackTimeZone;

            if (source === "ipwho") {
                if (data.success === false) return null;
                country = data.country;
                region = data.region || data.region_name;
                city = data.city;
                zone = data.timezone?.id || fallbackTimeZone;
            } else if (source === "freeipapi") {
                country = data.countryName;
                region = data.regionName;
                city = data.cityName;
                zone = data.timeZone || fallbackTimeZone;
            } else if (source === "ipapi") {
                if (data.error) return null;
                country = data.country_name;
                region = data.region;
                city = data.city;
                zone = data.timezone || fallbackTimeZone;
            } else {
                return null;
            }

            const joined = joinLocationParts([country, region, city]);
            if (!joined) {
                return null;
            }

            const timeZoneId = zone || fallbackTimeZone || "未知时区";
            const utcOffsetLabel = getUtcOffsetLabel(timeZoneId).replace(/[（）]/g, "") || "未知时区";

            return {
                locationText: `所在地：${joined}`,
                timeZoneId,
                timezoneText: `（${utcOffsetLabel}）`
            };
        }

        function normalizeUtcOffsetLabel(rawLabel) {
            const text = String(rawLabel || "").trim();
            if (!text) return "";

            const normalized = text.replace(/^GMT/i, "UTC");
            if (/^UTC[+-]\d{1,2}$/.test(normalized)) {
                const sign = normalized.includes("-") ? "-" : "+";
                const hour = normalized.replace(/^UTC[+-]/, "").padStart(2, "0");
                return `（UTC${sign}${hour}:00）`;
            }

            if (/^UTC[+-]\d{1,2}:\d{2}$/.test(normalized)) {
                const [, sign, hour, minute] = normalized.match(/^UTC([+-])(\d{1,2}):(\d{2})$/) || [];
                if (!sign) return "";
                return `（UTC${sign}${hour.padStart(2, "0")}:${minute}）`;
            }

            return normalized.startsWith("UTC") ? `（${normalized}）` : "";
        }

        function getUtcOffsetLabel(timeZone) {
            if (!timeZone || timeZone === "未知时区") {
                return "";
            }

            try {
                const formatter = new Intl.DateTimeFormat("en-US", {
                    timeZone,
                    timeZoneName: "shortOffset"
                });
                const offsetPart = formatter.formatToParts(new Date()).find(part => part.type === "timeZoneName")?.value || "";
                return normalizeUtcOffsetLabel(offsetPart);
            } catch {
                if (timeZone === Intl.DateTimeFormat().resolvedOptions().timeZone) {
                    const offsetMinutes = -new Date().getTimezoneOffset();
                    const sign = offsetMinutes >= 0 ? "+" : "-";
                    const absMinutes = Math.abs(offsetMinutes);
                    const hours = String(Math.floor(absMinutes / 60)).padStart(2, "0");
                    const minutes = String(absMinutes % 60).padStart(2, "0");
                    return `（UTC${sign}${hours}:${minutes}）`;
                }
                return "";
            }
        }

        function getCachedTimeZoneId(cached, localTimeZone) {
            if (cached?.timeZoneId) {
                return cached.timeZoneId;
            }

            const raw = String(cached?.timezoneText || "").replace(/^时区：/, "").replace(/[（）]/g, "").trim();
            if (!raw) {
                return localTimeZone;
            }

            return /^UTC/i.test(raw) ? localTimeZone : raw.trim() || localTimeZone;
        }

        async function fetchLocationJson(url, timeout = 5000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);

            try {
                const response = await fetch(url, {
                    signal: controller.signal,
                    cache: "no-store"
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                return await response.json();
            } finally {
                clearTimeout(timer);
            }
        }

        async function updateLocationInfo() {
            const localTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "未知时区";
            timezoneTextEl.textContent = `（${getUtcOffsetLabel(localTimeZone).replace(/[（）]/g, "") || "未知时区"}）`;

            try {
                const cachedRaw = localStorage.getItem(LOCATION_CACHE_KEY);
                if (cachedRaw) {
                    const cached = JSON.parse(cachedRaw);
                    if (cached.expiresAt > Date.now() && cached.locationText) {
                        const cachedTimeZoneId = getCachedTimeZoneId(cached, localTimeZone);
                        locationTextEl.textContent = cached.locationText;
                        timezoneTextEl.textContent = `（${getUtcOffsetLabel(cachedTimeZoneId).replace(/[（）]/g, "") || "未知时区"}）`;
                        return;
                    }
                }
            } catch (error) {
                console.warn("读取所在地缓存失败：", error);
            }

            const apiConfigs = [
                { name: "ipwho", url: "https://ipwho.is/?lang=zh" },
                { name: "ipapi", url: "https://ipapi.co/json/" },
                { name: "freeipapi", url: "https://freeipapi.com/api/json" }
            ];

            let lastError = null;

            for (const api of apiConfigs) {
                try {
                    const data = await fetchLocationJson(api.url, 5000);
                    const result = parseLocationResult(api.name, data, localTimeZone);

                    if (!result) {
                        throw new Error("定位结果为空");
                    }

                    locationTextEl.textContent = result.locationText;
                    timezoneTextEl.textContent = result.timezoneText;

                    try {
                        localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({
                            locationText: result.locationText,
                            timezoneText: result.timezoneText,
                            timeZoneId: result.timeZoneId,
                            expiresAt: Date.now() + LOCATION_CACHE_TTL
                        }));
                    } catch (error) {
                        console.warn("写入所在地缓存失败：", error);
                    }

                    return;
                } catch (error) {
                    lastError = error;
                    console.warn(`定位接口不可用：${api.url}`, error);
                }
            }

            locationTextEl.textContent = "所在地：暂时无法获取";
            timezoneTextEl.textContent = `（${getUtcOffsetLabel(localTimeZone).replace(/[（）]/g, "") || "未知时区"}）`;

            if (lastError) {
                console.warn("所有定位接口均不可用，已回退为仅显示时区。", lastError);
            }
        }

        function updateNowClock() {
            const now = new Date();
            document.getElementById("nowClock").textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            document.getElementById("todayText").textContent =
                `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 · ${formatWeekday(now)}`;
            document.getElementById("todayExtraText").textContent = formatLunarDate(now);
        }

        updateSortButtons();
        setDefaultDateTime();
        bindDragNumberInput(targetYearEl);
        bindDragNumberInput(targetMonthEl);
        bindDragNumberInput(targetDayEl);
        bindDragNumberInput(targetHourEl);
        bindDragNumberInput(targetMinuteEl);
        bindDragNumberInput(daysEl);
        bindDragNumberInput(hoursEl);
        bindDragNumberInput(minutesEl);
        bindDragNumberInput(secondsEl);
        syncDurationPicker();
        updateNowClock();
        updateLocationInfo();
        render();

        setInterval(() => {
            updateNowClock();
            if (currentMode === "datetime") {
                syncDateTimePicker();
            }
            render();
        }, 1000);

        window.deleteEvent = deleteEvent;
        window.openEditModal = openEditModal;
    </script>
</body>
</html>
