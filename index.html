<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>倒计时器</title>
    <style>
        :root{
            --bg1:#0f172a;
            --bg2:#1e293b;
            --glow-1:rgba(96,165,250,.35);
            --glow-2:rgba(139,92,246,.28);
            --card:rgba(255,255,255,.12);
            --card-border:rgba(255,255,255,.18);
            --text:#eef2ff;
            --muted:#cbd5e1;
            --primary:#60a5fa;
            --primary-2:#8b5cf6;
            --accent-soft-1:rgba(96,165,250,.22);
            --accent-soft-2:rgba(139,92,246,.18);
            --accent-card:rgba(96,165,250,.08);
            --accent-card-hover:rgba(96,165,250,.14);
            --accent-card-border:rgba(96,165,250,.18);
            --accent-card-border-hover:rgba(96,165,250,.28);
            --focus-ring:rgba(96,165,250,.15);
            --focus-border:rgba(96,165,250,.7);
            --card-hover-border:rgba(96,165,250,.22);
            --card-hover-bg:rgba(255,255,255,.14);
            --danger:#fb7185;
            --success:#34d399;
            --warning:#fbbf24;
            --shadow:0 20px 50px rgba(0,0,0,.25);
            --radius:22px;
            --control-height:60px;
        }

        * { box-sizing: border-box; }
        body{
            margin:0;
            min-height:100vh;
            color:var(--text);
            font-family: "Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
            background:
                radial-gradient(circle at top left, var(--glow-1), transparent 30%),
                radial-gradient(circle at top right, var(--glow-2), transparent 30%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            transition:background .45s ease, color .3s ease;
        }

        .container{
            width:min(1120px, calc(100% - 32px));
            margin:32px auto;
        }

        .hero{
            display:grid;
            grid-template-columns: 1.1fr .9fr;
            gap:24px;
            align-items:stretch;
        }

        .panel{
            background:var(--card);
            border:1px solid var(--card-border);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease, background .25s ease;
        }

        .hero-left{
            padding:28px;
        }

        .hero-right{
            padding:22px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            gap:10px;
        }

        h1{
            margin:0 0 10px;
            font-size:clamp(28px, 4vw, 42px);
            line-height:1.1;
        }

        .sub{
            margin:0;
            color:var(--muted);
            font-size:15px;
            line-height:1.7;
        }

        .stats{
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:14px;
            margin-top:24px;
        }

        .stat{
            padding:16px;
            border-radius:18px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            transition:transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease;
        }

        .stat .v{
            font-size:28px;
            font-weight:700;
            margin-bottom:6px;
        }

        .stat .k{
            color:var(--muted);
            font-size:13px;
        }

        .clock{
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:138px;
            border-radius:20px;
            background:
                linear-gradient(135deg, var(--accent-soft-1), var(--accent-soft-2));
            border:1px solid rgba(255,255,255,.12);
            font-size:clamp(28px, 5vw, 44px);
            font-weight:800;
            letter-spacing:2px;
        }

        .today{
            color:var(--muted);
            text-align:center;
            font-size:14px;
        }

        .today-extra{
            color:var(--muted);
            text-align:center;
            font-size:13px;
            line-height:1.7;
            letter-spacing:.02em;
        }

        .location-info{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:4px;
            flex-wrap:wrap;
            text-align:center;
            color:var(--muted);
            font-size:12px;
            line-height:1.4;
            min-height:18px;
        }

        .location-info > div{
            white-space:nowrap;
        }

        .location-info > div:empty{
            display:none;
        }

        .location-info > div + div::before{
            content:"";
            margin-right:0;
        }

        .form-wrap{
            margin-top:24px;
            padding:24px;
        }

        .toolbar{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            margin-bottom:18px;
        }

        .toolbar-group{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            align-items:center;
        }

        .theme-switcher{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            align-items:center;
        }

        .theme-cluster{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            align-items:center;
            padding:8px 10px;
            border-radius:999px;
            background:rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.08);
        }

        .theme-label{
            color:var(--muted);
            font-size:13px;
        }

        .mode-btn{
            border:none;
            min-width:58px;
            padding:7px 12px;
            border-radius:999px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            color:var(--text);
            cursor:pointer;
            font-size:13px;
            transition:background .2s ease, border-color .2s ease, box-shadow .2s ease, color .2s ease;
        }

        .mode-btn.active{
            background:linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color:transparent;
            box-shadow:0 8px 18px var(--accent-card-hover);
        }

        .theme-btn{
            position:relative;
            min-width:64px;
            height:30px;
            padding:0 10px 0 8px;
            border-radius:999px;
            border:1px solid rgba(255,255,255,.14);
            cursor:pointer;
            transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease, opacity .2s ease, background .2s ease, color .2s ease;
            box-shadow:0 6px 14px rgba(15,23,42,.18);
            opacity:.95;
            background:rgba(255,255,255,.08);
            color:var(--text);
            display:inline-flex;
            align-items:center;
            gap:8px;
            font-size:12px;
            font-weight:600;
        }

        .theme-btn:hover{
            transform:scale(1.08);
            opacity:1;
        }

        .theme-btn.active{
            border-color:rgba(255,255,255,.82);
            background:rgba(255,255,255,.16);
            box-shadow:0 0 0 4px rgba(255,255,255,.12), 0 8px 18px rgba(15,23,42,.24);
            opacity:1;
        }

        .theme-btn::before{
            content:"";
            width:16px;
            height:16px;
            flex:0 0 16px;
            border-radius:50%;
            box-shadow:inset 0 0 0 1px rgba(255,255,255,.24), 0 2px 8px rgba(15,23,42,.2);
        }

        .theme-btn::after{
            content:attr(data-label);
            line-height:1;
            white-space:nowrap;
        }

        .theme-btn.aurora::before{ background:linear-gradient(135deg,#60a5fa,#8b5cf6); }
        .theme-btn.sunset::before{ background:linear-gradient(135deg,#fb7185,#f59e0b); }
        .theme-btn.forest::before{ background:linear-gradient(135deg,#34d399,#0f766e); }
        .theme-btn.ocean::before{ background:linear-gradient(135deg,#38bdf8,#2563eb); }
        .theme-btn.festival::before{ background:conic-gradient(from 160deg,#ef4444,#f59e0b,#facc15,#ef4444); }
        .theme-btn.exam::before{ background:linear-gradient(135deg,#6366f1 0 50%,#22c55e 50% 100%); }
        .theme-btn.tech::before{ background:repeating-linear-gradient(135deg,#06b6d4 0 6px,#7c3aed 6px 12px); }

        body.light-theme{
            --card:rgba(255,255,255,.68);
            --card-border:rgba(148,163,184,.28);
            --text:#0f172a;
            --muted:#475569;
            --shadow:0 18px 42px rgba(148,163,184,.18);
        }

        body.light-theme .panel,
        body.light-theme .stat,
        body.light-theme .clock,
        body.light-theme .card,
        body.light-theme .time-spinner,
        body.light-theme .theme-cluster,
        body.light-theme .datetime-divider::before,
        body.light-theme .empty,
        body.light-theme .remark,
        body.light-theme .progress,
        body.light-theme .tab,
        body.light-theme .mode-btn,
        body.light-theme input,
        body.light-theme textarea{
            -webkit-backdrop-filter:blur(18px);
            backdrop-filter:blur(18px);
        }

        body.light-theme .stat,
        body.light-theme .tab,
        body.light-theme .mode-btn,
        body.light-theme input,
        body.light-theme textarea,
        body.light-theme .time-spinner,
        body.light-theme .theme-cluster,
        body.light-theme .empty,
        body.light-theme .remark,
        body.light-theme .progress{
            background:rgba(255,255,255,.54);
            border-color:rgba(148,163,184,.26);
        }

        body.light-theme .spinner-group.date-group .time-spinner{
            background:rgba(255,255,255,.86);
            border-color:rgba(148,163,184,.34);
            box-shadow:0 10px 20px rgba(148,163,184,.1);
        }

        body.light-theme .spinner-group.time-group .time-spinner,
        body.light-theme .datetime-divider.time-divider::before{
            background:rgba(255,255,255,.92);
            border-color:rgba(99,102,241,.22);
            box-shadow:0 10px 22px rgba(148,163,184,.12);
        }

        body.light-theme .clock{
            border-color:rgba(148,163,184,.22);
        }

        body.light-theme .today,
        body.light-theme .today-extra,
        body.light-theme .location-info{
            color:#475569;
        }

        body.light-theme .time-spinner::after{
            background:rgba(255,255,255,.68);
            border-color:rgba(148,163,184,.18);
        }

        body.light-theme .time-spinner-side{
            color:rgba(71,85,105,.56);
        }

        body.light-theme .datetime-divider{
            color:#475569;
        }

        body.light-theme .datetime-divider.date-divider::before{
            background:rgba(255,255,255,.84);
            border-color:rgba(148,163,184,.24);
            box-shadow:0 8px 18px rgba(148,163,184,.12);
        }

        body.light-theme .badge{
            background:rgba(15,23,42,.08);
            border-color:rgba(148,163,184,.18);
            color:#0f172a;
        }

        body.light-theme .badge.running{ background:rgba(52,211,153,.18); color:#065f46; }
        body.light-theme .badge.done{ background:rgba(251,113,133,.16); color:#9f1239; }

        body.light-theme .mini.danger{
            color:#9f1239;
            border-color:rgba(244,114,182,.2);
        }

        body.light-theme .mini.edit{
            color:#1d4ed8;
            border-color:rgba(96,165,250,.24);
            background:rgba(96,165,250,.12);
        }

        body.light-theme .btn.secondary{
            color:var(--text);
            background:rgba(255,255,255,.54);
            border-color:rgba(148,163,184,.26);
        }

        body.light-theme .section-title,
        body.light-theme .card .title,
        body.light-theme .card .remain{
            color:#0f172a;
        }

        body.light-theme .card.is-done .remain,
        body.light-theme .card:hover.is-done .remain{
            color:#0f172a;
            background:
                linear-gradient(135deg, rgba(255,255,255,.88), rgba(255,255,255,.76)),
                linear-gradient(135deg, var(--accent-soft-1), var(--accent-soft-2));
            border-color:var(--accent-card-border-hover);
            box-shadow:0 12px 28px rgba(148,163,184,.18), inset 0 1px 0 rgba(255,255,255,.9);
        }

        body.light-theme .list-toolbar .section-title{
            display:inline-flex;
            align-items:center;
            min-height:48px;
            padding:8px 18px;
            border-radius:16px;
            background:rgba(255,255,255,.88);
            border:1px solid rgba(148,163,184,.22);
            box-shadow:0 10px 24px rgba(148,163,184,.16);
            color:#020617;
            text-shadow:0 1px 0 rgba(255,255,255,.55);
        }

        body.light-theme .card{
            background:rgba(255,255,255,.78);
            border-color:rgba(148,163,184,.24);
            box-shadow:0 16px 32px rgba(148,163,184,.16);
        }

        body.light-theme .card .meta{
            color:#475569;
        }

        body.light-theme .card .remark{
            color:#1e293b;
            background:rgba(255,255,255,.74);
            border-color:rgba(148,163,184,.2);
        }

        body.light-theme .card .progress{
            background:rgba(226,232,240,.72);
            border-color:rgba(148,163,184,.18);
        }

        body.light-theme .modal-backdrop{
            background:rgba(148,163,184,.34);
        }

        body.light-theme .modal-card{
            background:rgba(255,255,255,.92);
            border-color:rgba(148,163,184,.22);
            box-shadow:0 20px 44px rgba(148,163,184,.22);
        }

        body.light-theme .sort-group label,
        body.light-theme .toolbar-group .tab,
        body.light-theme .sort-btn{
            color:#334155;
        }

        body.light-theme .tab,
        body.light-theme .mode-btn,
        body.light-theme .sort-btn{
            background:rgba(255,255,255,.82);
            border-color:rgba(148,163,184,.24);
            box-shadow:0 6px 14px rgba(148,163,184,.1);
        }

        body.light-theme .tab.active,
        body.light-theme .mode-btn.active,
        body.light-theme .sort-btn.active{
            color:#ffffff;
            background:linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color:transparent;
            box-shadow:0 0 0 4px var(--focus-ring), 0 14px 28px rgba(148,163,184,.24);
        }

        body.light-theme .toolbar-group .tab:not(.active):hover,
        body.light-theme .sort-btn:not(.active):hover,
        body.light-theme .mode-btn:not(.active):hover{
            color:#0f172a;
            background:rgba(255,255,255,.96);
        }

        body.light-theme .sort-group{
            background:rgba(255,255,255,.72);
            border-color:rgba(148,163,184,.22);
            box-shadow:0 8px 18px rgba(148,163,184,.12);
        }

        body.light-theme .sort-btn{
            min-width:92px;
        }

        body.light-theme .theme-btn{
            background:rgba(255,255,255,.72);
            border-color:rgba(148,163,184,.24);
            color:#334155;
            box-shadow:0 8px 18px rgba(148,163,184,.14);
        }

        body.light-theme .theme-btn.active{
            background:rgba(255,255,255,.96);
            border-color:var(--focus-border);
            box-shadow:0 0 0 4px var(--focus-ring), 0 12px 24px rgba(148,163,184,.2);
        }

        body.light-theme .tab:hover:not(.active),
        body.light-theme .mode-btn:hover:not(.active),
        body.light-theme .theme-btn:hover,
        body.light-theme input:hover,
        body.light-theme textarea:hover,
        body.light-theme .time-spinner:hover,
        body.light-theme .stat:hover,
        body.light-theme .card:hover{
            border-color:var(--focus-border);
            box-shadow:0 0 0 3px var(--focus-ring), 0 14px 28px rgba(148,163,184,.22);
        }

        body.light-theme .card:hover{
            background:rgba(255,255,255,.94);
            color:#0f172a;
        }

        body.light-theme .card:hover .title,
        body.light-theme .card:hover .remain,
        body.light-theme .card:hover .meta,
        body.light-theme .card:hover .remark{
            color:#0f172a;
        }

        body.light-theme .card:hover.is-done .remain{
            color:#0f172a;
        }

        body.light-theme .card.is-done .remain::before,
        body.light-theme .card:hover.is-done .remain::before{
            background:radial-gradient(circle at 35% 35%, rgba(255,255,255,1), rgba(255,255,255,.72) 34%, var(--primary) 35%, var(--primary-2) 100%);
            box-shadow:0 0 0 4px rgba(255,255,255,.72), 0 6px 16px rgba(148,163,184,.18);
        }

        body.light-theme .card:hover .meta{
            color:#475569;
        }

        body.light-theme .time-spinner:hover{
            background:rgba(255,255,255,.98);
        }

        body.light-theme .time-spinner:hover::after{
            background:rgba(255,255,255,.94);
            border-color:var(--focus-border);
        }

        .tab{
            border:none;
            color:var(--text);
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            padding:10px 16px;
            border-radius:999px;
            cursor:pointer;
            transition:.2s ease;
            font-size:14px;
        }

        .tab.active{
            background:linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color:transparent;
            transform:translateY(-1px);
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(12, 1fr);
            gap:16px;
        }

        .field{
            grid-column: span 12;
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .field.col-6{ grid-column: span 6; }
        .field.col-3{ grid-column: span 3; }

        .field.compact input{
            min-height:52px;
            padding:8px 16px;
        }

        label{
            font-size:14px;
            color:var(--muted);
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px 16px;
            min-height:var(--control-height);
            border-radius:16px;
            border:1px solid rgba(255,255,255,.12);
            outline:none;
            color:var(--text);
            background:rgba(255,255,255,.08);
            font-size:15px;
            transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
        }

        input:hover,
        textarea:hover,
        select:hover{
            background:rgba(255,255,255,.16);
            border-color:rgba(255,255,255,.3);
            box-shadow:0 0 0 3px rgba(255,255,255,.05), 0 12px 24px rgba(15,23,42,.2);
        }

        input:focus,
        textarea:focus,
        select:focus{
            border-color:var(--focus-border);
            box-shadow:0 0 0 4px var(--focus-ring);
        }

        textarea{
            min-height:96px;
            resize:vertical;
        }

        .field-hint{
            margin:0;
            color:var(--muted);
            font-size:12px;
            line-height:1.5;
        }

        .datetime-combo{
            display:flex;
            flex-direction:row;
            align-items:flex-start;
            gap:12px;
            width:max-content;
            max-width:100%;
        }

        .spinner-group{
            display:flex;
            flex-wrap:nowrap;
            gap:12px;
            align-items:stretch;
        }

        .duration-combo{
            display:flex;
            flex-wrap:wrap;
            gap:12px;
            width:max-content;
            max-width:100%;
        }

        .spinner-group.date-group .time-spinner{
            background:rgba(255,255,255,.07);
        }

        .spinner-group.time-group .time-spinner{
            background:var(--accent-card);
        }

        .datetime-divider{
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:var(--control-height);
            padding:0 4px;
            color:rgba(238,242,255,.72);
            font-size:13px;
            font-weight:700;
            letter-spacing:.08em;
            white-space:nowrap;
            transition:opacity .25s ease, filter .25s ease;
        }

        .datetime-divider.date-divider::before{
            content:"日期";
            padding:8px 10px;
            border-radius:999px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.1);
        }

        .datetime-divider.time-divider::before{
            content:"时间";
            padding:8px 10px;
            border-radius:999px;
            background:var(--accent-card);
            border:1px solid var(--accent-card-border);
        }

        .time-spinner{
            position:relative;
            width:96px;
            height:var(--control-height);
            min-height:var(--control-height);
            padding:4px 8px;
            border-radius:16px;
            border:1px solid rgba(255,255,255,.12);
            background:rgba(255,255,255,.08);
            display:grid;
            grid-template-rows:1fr 30px 1fr;
            justify-items:center;
            align-items:center;
            overflow:hidden;
            touch-action:none;
            transition:border-color .22s ease, background .22s ease, box-shadow .22s ease;
        }

        .time-spinner.year-spinner{
            width:124px;
        }

        .time-spinner.duration-day-spinner{
            width:124px;
        }

        .time-spinner.duration-day-spinner input{
            width:3ch;
            font-size:22px;
        }

        .time-spinner.month-spinner,
        .time-spinner.day-spinner{
            width:92px;
        }

        .time-spinner::after{
            content:"";
            position:absolute;
            left:8px;
            right:8px;
            top:50%;
            height:28px;
            transform:translateY(-50%);
            border-radius:12px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.08);
            pointer-events:none;
            transition:background .22s ease, border-color .22s ease, transform .22s ease;
        }

        .time-spinner-side{
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            width:100%;
            min-height:12px;
            z-index:1;
            font-size:12px;
            line-height:1;
            color:rgba(238,242,255,.28);
            -webkit-user-select:none;
            user-select:none;
            pointer-events:none;
        }

        .time-spinner-side.is-empty{
            opacity:0;
        }

        .time-spinner-main{
            position:relative;
            z-index:1;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:4px;
            height:30px;
            transform:translateY(-1px);
        }

        .time-spinner input{
            width:2ch;
            padding:0;
            border:none;
            border-radius:0;
            background:transparent;
            box-shadow:none;
            text-align:center;
            min-height:28px;
            font-size:24px;
            font-weight:800;
            line-height:28px;
            letter-spacing:0;
            cursor:ns-resize;
            display:block;
            touch-action:none;
        }

        .time-spinner.year-spinner input{
            width:4ch;
            font-size:22px;
        }

        .time-spinner input:focus{
            box-shadow:none;
        }

        .time-spinner:hover{
            border-color:rgba(255,255,255,.34);
            background:rgba(255,255,255,.16);
            box-shadow:0 0 0 3px rgba(255,255,255,.04), 0 14px 28px rgba(15,23,42,.24);
        }

        .spinner-group.time-group .time-spinner:hover{
            background:var(--accent-card-hover);
            border-color:var(--accent-card-border-hover);
            box-shadow:0 0 0 3px var(--focus-ring), 0 14px 28px rgba(15,23,42,.24);
        }

        .spinner-group.date-group .time-spinner:hover,
        .duration-combo .time-spinner:hover{
            background:rgba(255,255,255,.12);
        }

        .time-spinner:hover::after{
            background:rgba(255,255,255,.14);
            border-color:rgba(255,255,255,.22);
        }

        .time-spinner-unit{
            display:inline-flex;
            align-items:center;
            height:28px;
            font-size:12px;
            color:var(--muted);
            font-weight:600;
            margin:0;
            line-height:1;
        }

        .mode-datetime{
            align-items:flex-start;
        }

        .mode-datetime .field-hint{
            max-width:520px;
        }

        .time-spinner.dragging{
            border-color:var(--focus-border);
            box-shadow:0 0 0 4px var(--focus-ring);
        }

        .actions{
            margin-top:18px;
            display:flex;
            gap:12px;
            flex-wrap:wrap;
        }

        .btn{
            border:none;
            padding:13px 18px;
            border-radius:16px;
            cursor:pointer;
            font-size:15px;
            color:white;
            transition:box-shadow .2s ease, background .2s ease, border-color .2s ease, filter .2s ease;
        }

        .btn:hover{ filter:brightness(1.04); }
        .btn.primary{
            background:linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow:0 10px 22px var(--accent-card-hover);
        }
        .btn.secondary{
            background:rgba(255,255,255,.1);
            border:1px solid rgba(255,255,255,.12);
        }

        .section-title{
            margin:28px 0 14px;
            font-size:20px;
        }

        .list-toolbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
            margin:28px 0 14px;
        }

        .list-toolbar .section-title{
            margin:0;
        }

        .sort-wrap{
            display:flex;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
        }

        .sort-group{
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
            padding:10px 12px;
            border-radius:18px;
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.1);
        }

        .sort-group label{
            font-size:13px;
            white-space:nowrap;
        }

        .sort-options{
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
        }

        .sort-btn{
            border:none;
            min-width:84px;
            min-height:40px;
            padding:8px 14px;
            border-radius:999px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            color:var(--text);
            cursor:pointer;
            font-size:13px;
            transition:background .2s ease, border-color .2s ease, box-shadow .2s ease, color .2s ease;
        }

        .sort-btn.active{
            background:linear-gradient(135deg, var(--primary), var(--primary-2));
            border-color:transparent;
            box-shadow:0 8px 18px var(--accent-card-hover);
        }

        .list{
            display:grid;
            grid-template-columns: repeat(12, 1fr);
            gap:18px;
        }

        .card{
            grid-column: span 6;
            padding:20px;
            position:relative;
            overflow:hidden;
            transition:box-shadow .28s ease, border-color .28s ease, background .28s ease;
        }

        .card::after{
            content:"";
            position:absolute;
            inset:auto -40px -40px auto;
            width:120px;
            height:120px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%);
            pointer-events:none;
        }

        .card-header{
            display:flex;
            justify-content:space-between;
            gap:12px;
            align-items:flex-start;
            margin-bottom:14px;
        }

        .title{
            font-size:18px;
            font-weight:700;
            word-break:break-all;
        }

        .badge{
            white-space:nowrap;
            font-size:12px;
            padding:6px 10px;
            border-radius:999px;
            color:white;
            background:rgba(255,255,255,.12);
            border:1px solid rgba(255,255,255,.14);
        }

        .badge.running{ background:rgba(52,211,153,.18); color:#d1fae5; }
        .badge.done{ background:rgba(251,113,133,.18); color:#ffe4e6; }

        .remain{
            font-size:clamp(24px, 3vw, 34px);
            font-weight:800;
            letter-spacing:1px;
            margin:8px 0 12px;
        }

        .card.is-done .remain{
            display:inline-flex;
            align-items:center;
            gap:10px;
            padding:10px 16px;
            border-radius:18px;
            color:var(--text);
            background:
                linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
                linear-gradient(135deg, var(--accent-soft-1), var(--accent-soft-2));
            border:1px solid var(--accent-card-border-hover);
            box-shadow:0 12px 28px rgba(15,23,42,.18), inset 0 1px 0 rgba(255,255,255,.14);
            text-shadow:0 1px 0 rgba(255,255,255,.06);
        }

        .card.is-done .remain::before{
            content:"";
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:14px;
            height:14px;
            border-radius:999px;
            background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.95), rgba(255,255,255,.5) 35%, var(--primary) 36%, var(--primary-2) 100%);
            box-shadow:0 0 0 4px rgba(255,255,255,.08), 0 0 18px var(--accent-card-border-hover);
            flex:0 0 14px;
        }

        .meta{
            display:grid;
            gap:6px;
            color:var(--muted);
            font-size:13px;
            margin-bottom:14px;
        }

        .remark{
            margin:0 0 14px;
            padding:12px 14px;
            border-radius:14px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.1);
            color:var(--text);
            line-height:1.7;
            white-space:pre-wrap;
            word-break:break-word;
        }

        .progress{
            height:10px;
            border-radius:999px;
            overflow:hidden;
            background:rgba(255,255,255,.08);
            margin-bottom:14px;
            border:1px solid rgba(255,255,255,.1);
        }

        .bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg, var(--primary), var(--primary-2));
            transition:width .6s ease;
        }

        .card-actions{
            display:flex;
            justify-content:flex-end;
            gap:10px;
        }

        .mini{
            padding:9px 12px;
            font-size:13px;
            border-radius:12px;
        }

        .mini.danger{
            background:rgba(251,113,133,.16);
            color:#ffe4e6;
            border:1px solid rgba(251,113,133,.25);
        }

        .mini.edit{
            background:rgba(96,165,250,.16);
            color:#dbeafe;
            border:1px solid rgba(96,165,250,.25);
        }

        .modal-backdrop{
            position:fixed;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            background:rgba(15,23,42,.56);
            z-index:50;
        }

        .modal-backdrop.hidden{
            display:none !important;
        }

        .modal-card{
            width:min(560px, 100%);
            padding:24px;
        }

        .modal-title{
            margin:0 0 8px;
            font-size:24px;
        }

        .modal-sub{
            margin:0 0 18px;
            color:var(--muted);
            font-size:13px;
            line-height:1.6;
        }

        .modal-grid{
            display:grid;
            gap:14px;
        }

        .modal-mode-switch{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:4px;
        }

        .modal-duration-grid{
            display:grid;
            grid-template-columns:repeat(4, minmax(0, 1fr));
            gap:12px;
        }

        .modal-duration-grid input{
            text-align:center;
        }

        .modal-actions{
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-top:18px;
            flex-wrap:wrap;
        }

        .datetime-native{
            font-family:inherit;
        }

        @media (max-width: 640px){
            .modal-duration-grid{
                grid-template-columns:repeat(2, minmax(0, 1fr));
            }
        }

        .empty{
            padding:30px;
            text-align:center;
            color:var(--muted);
            border:1px dashed rgba(255,255,255,.16);
            border-radius:20px;
            grid-column:1 / -1;
            background:rgba(255,255,255,.05);
        }

        .hidden{ display:none !important; }

        @media (hover: hover){
            .panel:hover{
                border-color:rgba(255,255,255,.3);
                box-shadow:0 18px 36px rgba(15,23,42,.26);
            }

            .stat:hover{
                background:rgba(255,255,255,.16);
                border-color:rgba(255,255,255,.28);
                box-shadow:0 0 0 3px rgba(255,255,255,.04), 0 14px 28px rgba(15,23,42,.22);
            }

            .tab:hover:not(.active){
                background:rgba(255,255,255,.16);
                border-color:rgba(255,255,255,.28);
                box-shadow:0 0 0 3px rgba(255,255,255,.04), 0 12px 24px rgba(15,23,42,.18);
            }

            .mode-btn:hover:not(.active),
            .sort-btn:hover:not(.active),
            .theme-btn:hover,
            .sort-group:hover{
                border-color:rgba(255,255,255,.26);
                box-shadow:0 0 0 3px rgba(255,255,255,.04), 0 12px 24px rgba(15,23,42,.18);
            }

            .datetime-divider:hover{
                opacity:.95;
                filter:brightness(1.14);
            }

            .card:hover{
                border-color:var(--card-hover-border);
                background:var(--card-hover-bg);
                box-shadow:0 0 0 3px var(--focus-ring), 0 20px 40px rgba(15,23,42,.26);
            }
        }

        @media (max-width: 900px){
            .hero{ grid-template-columns:1fr; }
            .card{ grid-column: span 12; }
            .field.col-6, .field.col-3{ grid-column: span 12; }
            .stats{ grid-template-columns:1fr; }
            .datetime-combo{ width:max-content; }
        }

        @media (max-width: 640px){
            .datetime-combo,
            .spinner-group,
            .duration-combo{
                width:100%;
            }

            .datetime-combo{
                flex-direction:column;
            }

            .spinner-group{
                flex-wrap:wrap;
            }

            .spinner-group.date-group{
                flex-direction:column;
                gap:10px;
                width:100%;
                align-items:stretch;
            }

            .spinner-group.date-group .time-spinner,
            .spinner-group.date-group .time-spinner.year-spinner,
            .spinner-group.date-group .time-spinner.month-spinner,
            .spinner-group.date-group .time-spinner.day-spinner{
                width:100%;
                min-width:0;
            }

            .datetime-divider{
                justify-content:flex-start;
                min-height:0;
                padding:0;
            }

            .time-spinner{
                width:100%;
            }

            .mode-duration .duration-combo{
                display:flex;
                flex-direction:column;
                gap:10px;
                align-items:stretch;
            }

            .mode-duration .duration-combo .time-spinner{
                width:100%;
                min-width:0;
            }

            .hero-right{
                gap:12px;
            }

            .location-info{
                flex-direction:column;
                gap:4px;
            }

            .location-info > div + div::before{
                content:none;
                margin-right:0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="panel hero-left">
                <h1>倒计时事件</h1>
                <p class="sub">
                    支持两种方式：指定未来具体时间，或输入天 / 时 / 分 / 秒快速创建倒计时。
                    所有事件自动保存到本地，刷新页面不会丢失。
                </p>

                <div class="stats">
                    <div class="stat">
                        <div class="v" id="statTotal">0</div>
                        <div class="k">总事件数</div>
                    </div>
                    <div class="stat">
                        <div class="v" id="statRunning">0</div>
                        <div class="k">进行中</div>
                    </div>
                    <div class="stat">
                        <div class="v" id="statFinished">0</div>
                        <div class="k">已结束</div>
                    </div>
                </div>
            </div>

            <div class="panel hero-right">
                <div class="clock" id="nowClock">00:00:00</div>
                <div class="today" id="todayText">--</div>
                <div class="today-extra" id="todayExtraText">--</div>
                <div class="location-info" id="locationInfo">
                    <div id="locationText">正在获取所在地...</div>
                    <div id="timezoneText"></div>
                </div>
            </div>
        </section>

        <section class="panel form-wrap">
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="tab active" data-mode="datetime">按具体时间</button>
                    <button class="tab" data-mode="duration">按时长倒计时</button>
                </div>
                <div class="theme-switcher" aria-label="主题切换">
                    <div class="theme-cluster" aria-label="明暗模式">
                        <span class="theme-label">模式</span>
                        <button class="mode-btn active" type="button" data-appearance="dark">深色</button>
                        <button class="mode-btn" type="button" data-appearance="light">浅色</button>
                    </div>
                    <div class="theme-cluster" aria-label="配色主题">
                        <span class="theme-label">主题</span>
                        <button class="theme-btn aurora active" type="button" data-theme="aurora" data-label="极光" aria-label="极光主题" title="极光主题"></button>
                        <button class="theme-btn sunset" type="button" data-theme="sunset" data-label="落日" aria-label="落日主题" title="落日主题"></button>
                        <button class="theme-btn forest" type="button" data-theme="forest" data-label="森林" aria-label="森林主题" title="森林主题"></button>
                        <button class="theme-btn ocean" type="button" data-theme="ocean" data-label="海洋" aria-label="海洋主题" title="海洋主题"></button>
                        <button class="theme-btn festival" type="button" data-theme="festival" data-label="节日" aria-label="节日主题" title="节日主题"></button>
                        <button class="theme-btn exam" type="button" data-theme="exam" data-label="考试" aria-label="考试主题" title="考试主题"></button>
                        <button class="theme-btn tech" type="button" data-theme="tech" data-label="科技" aria-label="科技主题" title="科技主题"></button>
                    </div>
                </div>
            </div>

            <div class="grid">
                <div class="field compact">
                    <label for="eventName">事件名称（必填）</label>
                    <input id="eventName" type="text" placeholder="例如：考试开始、下班、生日、项目发布" maxlength="50" required />
                </div>

                <div class="field mode-datetime">
                    <label for="targetYear">目标时间</label>
                    <div class="datetime-combo">
                        <div class="datetime-divider date-divider" aria-hidden="true"></div>
                        <div class="spinner-group date-group">
                            <div class="time-spinner year-spinner">
                                <div class="time-spinner-side" id="targetYearPrev"></div>
                                <div class="time-spinner-main">
                                    <input id="targetYear" type="text" inputmode="numeric" maxlength="4" data-digits="4" data-part="year" aria-label="目标年份" title="目标年份" />
                                    <span class="time-spinner-unit">年</span>
                                </div>
                                <div class="time-spinner-side" id="targetYearNext"></div>
                            </div>
                            <div class="time-spinner month-spinner">
                                <div class="time-spinner-side" id="targetMonthPrev"></div>
                                <div class="time-spinner-main">
                                    <input id="targetMonth" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-part="month" aria-label="目标月份" title="目标月份" />
                                    <span class="time-spinner-unit">月</span>
                                </div>
                                <div class="time-spinner-side" id="targetMonthNext"></div>
                            </div>
                            <div class="time-spinner day-spinner">
                                <div class="time-spinner-side" id="targetDayPrev"></div>
                                <div class="time-spinner-main">
                                    <input id="targetDay" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-part="day" aria-label="目标日期" title="目标日期" />
                                    <span class="time-spinner-unit">日</span>
                                </div>
                                <div class="time-spinner-side" id="targetDayNext"></div>
                            </div>
                        </div>
                        <div class="datetime-divider time-divider" aria-hidden="true"></div>
                        <div class="spinner-group time-group">
                            <div class="time-spinner">
                                <div class="time-spinner-side" id="targetHourPrev"></div>
                                <div class="time-spinner-main">
                                    <input id="targetHour" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-part="hour" aria-label="目标小时" title="目标小时" />
                                    <span class="time-spinner-unit">时</span>
                                </div>
                                <div class="time-spinner-side" id="targetHourNext"></div>
                            </div>
                            <div class="time-spinner">
                                <div class="time-spinner-side" id="targetMinutePrev"></div>
                                <div class="time-spinner-main">
                                    <input id="targetMinute" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-part="minute" aria-label="目标分钟" title="目标分钟" />
                                    <span class="time-spinner-unit">分</span>
                                </div>
                                <div class="time-spinner-side" id="targetMinuteNext"></div>
                            </div>
                        </div>
                    </div>
                    <p class="field-hint">日期与时间已分组显示；两者都支持直接输入、滚轮调整和上下拖动，且整体不能早于当前时间。</p>
                </div>

                <div class="field mode-duration hidden">
                    <label for="days">倒计时时长</label>
                    <div class="duration-combo">
                        <div class="time-spinner duration-day-spinner">
                            <div class="time-spinner-side" id="daysPrev"></div>
                            <div class="time-spinner-main">
                                <input id="days" type="text" inputmode="numeric" maxlength="3" data-digits="3" data-duration-part="days" aria-label="天数" title="天数" />
                                <span class="time-spinner-unit">天</span>
                            </div>
                            <div class="time-spinner-side" id="daysNext"></div>
                        </div>
                        <div class="time-spinner">
                            <div class="time-spinner-side" id="hoursPrev"></div>
                            <div class="time-spinner-main">
                                <input id="hours" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-duration-part="hours" aria-label="小时" title="小时" />
                                <span class="time-spinner-unit">时</span>
                            </div>
                            <div class="time-spinner-side" id="hoursNext"></div>
                        </div>
                        <div class="time-spinner">
                            <div class="time-spinner-side" id="minutesPrev"></div>
                            <div class="time-spinner-main">
                                <input id="minutes" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-duration-part="minutes" aria-label="分钟" title="分钟" />
                                <span class="time-spinner-unit">分</span>
                            </div>
                            <div class="time-spinner-side" id="minutesNext"></div>
                        </div>
                        <div class="time-spinner">
                            <div class="time-spinner-side" id="secondsPrev"></div>
                            <div class="time-spinner-main">
                                <input id="seconds" type="text" inputmode="numeric" maxlength="2" data-digits="2" data-duration-part="seconds" aria-label="秒数" title="秒数" />
                                <span class="time-spinner-unit">秒</span>
                            </div>
                            <div class="time-spinner-side" id="secondsNext"></div>
                        </div>
                    </div>
                    <p class="field-hint">时长也支持直接输入、滚轮调整和上下拖动调整。</p>
                </div>

                <div class="field">
                    <label for="eventRemark">备注（可选）</label>
                    <textarea id="eventRemark" placeholder="如果事件名称写不开，可以在这里补充说明" maxlength="200"></textarea>
                </div>
            </div>

            <div class="actions">
                <button class="btn primary" id="createBtn">创建倒计时</button>
                <button class="btn secondary" id="clearFinishedBtn">清除已结束</button>
            </div>
        </section>

        <div class="list-toolbar">
            <h2 class="section-title">我的倒计时</h2>
            <div class="sort-wrap">
                <div class="sort-group" aria-label="排列方式">
                    <label>排列方式</label>
                    <div class="sort-options">
                        <button class="sort-btn active" type="button" data-sort-field="endAt">结束时间</button>
                        <button class="sort-btn" type="button" data-sort-field="createdAt">创建时间</button>
                    </div>
                </div>
                <div class="sort-group" aria-label="排序方式">
                    <label>排序方式</label>
                    <div class="sort-options">
                        <button class="sort-btn active" type="button" data-sort-order="asc">升序</button>
                        <button class="sort-btn" type="button" data-sort-order="desc">降序</button>
                    </div>
                </div>
            </div>
        </div>
        <section class="list" id="eventList"></section>
    </div>

    <div class="modal-backdrop hidden" id="editModal">
        <div class="panel modal-card">
            <h3 class="modal-title">编辑倒计时</h3>
            <p class="modal-sub">可修改事件名称、备注、创建方式，以及对应的结束时间或剩余时长。</p>
            <div class="modal-grid">
                <div class="field">
                    <label>创建方式</label>
                    <div class="modal-mode-switch">

        function loadEvents() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            } catch {
                return [];
            }
        }

        function saveEvents() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        }

        function updateSortButtons() {
            sortFieldButtons.forEach(button => button.classList.toggle("active", button.dataset.sortField === currentSortField));
            sortOrderButtons.forEach(button => button.classList.toggle("active", button.dataset.sortOrder === currentSortOrder));
        }

        function applyAppearance(appearance) {
            const mode = appearance === "light" ? "light" : "dark";
            document.body.classList.toggle("light-theme", mode === "light");
            appearanceButtons.forEach(button => button.classList.toggle("active", button.dataset.appearance === mode));
            localStorage.setItem(APPEARANCE_KEY, mode);
        }

        function applyTheme(themeName) {
            const theme = THEMES[themeName] || THEMES.aurora;
            const root = document.documentElement;

            root.style.setProperty("--bg1", theme.bg1);
            root.style.setProperty("--bg2", theme.bg2);
            root.style.setProperty("--glow-1", theme.glow1);
            root.style.setProperty("--glow-2", theme.glow2);
            root.style.setProperty("--primary", theme.primary);
            root.style.setProperty("--primary-2", theme.primary2);
            root.style.setProperty("--accent-soft-1", theme.accentSoft1);
            root.style.setProperty("--accent-soft-2", theme.accentSoft2);
            root.style.setProperty("--accent-card", theme.accentCard);
            root.style.setProperty("--accent-card-hover", theme.accentCardHover);
            root.style.setProperty("--accent-card-border", theme.accentCardBorder);
            root.style.setProperty("--accent-card-border-hover", theme.accentCardBorderHover);
            root.style.setProperty("--focus-ring", theme.focusRing);
            root.style.setProperty("--focus-border", theme.focusBorder);
            root.style.setProperty("--card-hover-border", theme.cardHoverBorder);
            root.style.setProperty("--card-hover-bg", theme.cardHoverBg);

            themeButtons.forEach(button => button.classList.toggle("active", button.dataset.theme === themeName));
